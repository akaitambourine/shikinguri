<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>お金を残す！資金繰り改善シミュレーター</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }
        
        .expandable {
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease-in-out;
            max-height: 0; opacity: 0; overflow: hidden;
        }
        .expandable.open { max-height: 200px; opacity: 1; }

        /* 結果画面のアニメーション用 */
        .waterfall-item {
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .waterfall-item.show {
            opacity: 1;
            transform: translateY(0);
        }
        @keyframes flash-red {
            0% { background-color: rgba(220, 38, 38, 0); }
            50% { background-color: rgba(220, 38, 38, 0.3); }
            100% { background-color: rgba(220, 38, 38, 0); }
        }
        .flash-danger {
            animation: flash-red 0.8s ease-out;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans pb-32 transition-colors duration-700" id="body">

    <div id="view-form">
        <header class="fixed top-0 w-full z-50 bg-white shadow-sm border-b border-gray-200 left-0 right-0 mx-auto max-w-md">
            <div class="px-4 py-3">

            </div>

                        <button type="button" class="q-btn text-left px-3 py-3 rounded-xl border-2 border-gray-100 bg-gray-50 text-gray-600 text-sm font-medium hover:bg-gray-100 transition-colors active:scale-[0.98]" data-q="q1" data-val="2">🍳 飲食店・カフェ</button>
                        <button type="button" class="q-btn text-left px-3 py-3 rounded-xl border-2 border-gray-100 bg-gray-50 text-gray-600 text-sm font-medium hover:bg-gray-100 transition-colors active:scale-[0.98]" data-q="q1" data-val="3">✂️ 美容・サロン</button>
                        <button type="button" class="q-btn text-left px-3 py-3 rounded-xl border-2 border-gray-100 bg-gray-50 text-gray-600 text-sm font-medium hover:bg-gray-100 transition-colors active:scale-[0.98]" data-q="q1" data-val="4">📦 小売・EC</button>
                        <button type="button" class="q-btn text-left px-3 py-3 rounded-xl border-2 border-gray-100 bg-gray-50 text-gray-600 text-sm font-medium hover:bg-gray-100 transition-colors active:scale-[0.98]" data-q="q1" data-val="5">🚚 軽貨物</button>

        <footer class="fixed bottom-0 w-full z-50 bg-white border-t border-gray-200 left-0 right-0 mx-auto max-w-md shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">

    <div id="view-result" class="hidden min-h-screen bg-slate-900 text-white pb-32">
        <header class="w-full bg-slate-950 shadow-md border-b border-slate-800 left-0 right-0 mx-auto max-w-md fixed top-0 z-50">
            <div class="px-4 py-3">
                <h1 class="text-center font-bold text-slate-300 text-sm tracking-widest">シミュレーション結果</h1>
            </div>
        </header>

        <main class="max-w-md mx-auto pt-20 px-4 space-y-3" id="result-waterfall">
            </main>

        <div id="affiliate-area" class="hidden max-w-md mx-auto mt-8 px-4 pb-10 opacity-0 transition-opacity duration-1000">
            </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- 1. 状態管理 ---
            const state = {
                q1: null, q2: null, q3: null, delinquency: null,
                sales: '', exp1: '', exp2: '', exp3: '',
                hasRent: false, rent: '', debt_total: '', debt_monthly: '',
                salesPeriod: 'month', exp1Period: 'month', exp2Period: 'month', exp3Period: 'month', rentPeriod: 'month'
            };

            const expenseLabels = {
                '1': ['材料費', '外注費', '車両・ガソリン代'],
                '2': ['食材仕入', 'アルバイト代', '水光熱費'],
                '3': ['材料費', '広告宣伝費', '水光熱費'],
                '4': ['商品仕入', '梱包・配送費', '広告宣伝費'],
                '5': ['車両・ガソリン代', '保険料', '通信費'],
                '6': ['外注費', '通信サーバー代', '交通・交際費'],
                '7': ['仕入・材料費', '人件・外注費', 'その他経費']
            };

            // DOM要素
            const step2 = document.getElementById('step2');
            const qBtns = document.querySelectorAll('.q-btn');
            const moneyInputs = document.querySelectorAll('.money-input');
            const rentToggle = document.getElementById('rent-toggle');
            const rentWrapper = document.getElementById('rent-wrapper');
            const remainingCountEl = document.getElementById('remaining-count');
            const submitBtnWrapper = document.getElementById('submit-btn-wrapper');
            const remainingBox = document.getElementById('remaining-box');
            const btnSubmit = document.getElementById('btn-submit');
            
            // --- Web Audio API (音の生成) ---
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const playSound = (type) => {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                const now = audioCtx.currentTime;
                if (type === 'chime') {
                    // チャリーン！(売上)
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(880, now);
                    osc.frequency.exponentialRampToValueAtTime(1760, now + 0.1);
                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now); osc.stop(now + 0.3);
                } else if (type === 'cash') {
                    // ガシャン！(経費)
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(100, now);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    osc.start(now); osc.stop(now + 0.2);
                } else if (type === 'thud') {
                    // ドスン…(借金)
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.exponentialRampToValueAtTime(40, now + 0.3);
                    gain.gain.setValueAtTime(0.4, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                    osc.start(now); osc.stop(now + 0.4);
                } else if (type === 'error') {
                    // ブブー！(税金・警告)
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(120, now);
                    osc.frequency.setValueAtTime(100, now + 0.1);
                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.linearRampToValueAtTime(0, now + 0.4);
                    osc.start(now); osc.stop(now + 0.4);
                } else if (type === 'doom') {
                    // ドゴォォン(絶望・手残り)
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(60, now);
                    osc.frequency.exponentialRampToValueAtTime(20, now + 1.5);
                    gain.gain.setValueAtTime(0.5, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 1.5);
                    osc.start(now); osc.stop(now + 1.5);
                }
            };

            // --- ユーティリティ ---
            const scrollToElement = (elementId) => {
                const el = document.getElementById(elementId);
                if (el) {
                    const y = el.getBoundingClientRect().top + window.scrollY - window.innerHeight / 3; // 画面中央付近に
                    window.scrollTo({ top: y, behavior: 'smooth' });
                }
            };

            const updateProgress = () => {
                const required = ['q1', 'q2', 'q3', 'sales', 'exp1', 'exp2', 'exp3', 'debt_total', 'debt_monthly', 'delinquency'];
                if (state.hasRent) required.push('rent');

                const filledCount = required.filter(key => {
                    if (['q1', 'q2', 'q3', 'delinquency'].includes(key)) return state[key] !== null;
                    return state[key] !== '';
                }).length;

                const remaining = required.length - filledCount;
                
                if (remaining > 0) {
                    remainingCountEl.textContent = remaining;
                    remainingBox.style.opacity = '1';
                    submitBtnWrapper.classList.replace('translate-y-0', 'translate-y-full');
                    submitBtnWrapper.classList.replace('opacity-100', 'opacity-0');
                } else {
                    remainingBox.style.opacity = '0';
                    submitBtnWrapper.classList.replace('translate-y-full', 'translate-y-0');
                    submitBtnWrapper.classList.replace('opacity-0', 'opacity-100');
                }
            };

            // --- イベントリスナー (フォーム) ---
            document.querySelectorAll('.period-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const target = btn.dataset.target;
                    const val = btn.dataset.val;
                    state[`${target}Period`] = val;
                    document.querySelectorAll(`.period-btn[data-target="${target}"]`).forEach(b => {
                        if (b.dataset.val === val) {
                            b.classList.add('bg-white', 'shadow-sm', 'text-blue-600');
                            b.classList.remove('text-gray-400');
                        } else {
                            b.classList.remove('bg-white', 'shadow-sm', 'text-blue-600');
                            b.classList.add('text-gray-400');
                        }
                    });
                });
            });

            qBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const q = btn.dataset.q;
                    const val = btn.dataset.val;
                    state[q] = val;
                    
                    document.querySelectorAll(`.q-btn[data-q="${q}"]`).forEach(b => {
                        if (b.dataset.val === val) {
                            b.classList.replace('bg-gray-50', 'bg-blue-50');
                            b.classList.replace('border-gray-100', 'border-blue-500');
                            b.classList.replace('text-gray-600', 'text-blue-700');
                        } else {
                            b.classList.replace('bg-blue-50', 'bg-gray-50');
                            b.classList.replace('border-blue-500', 'border-gray-100');
                            b.classList.replace('text-blue-700', 'text-gray-600');
                        }
                    });

                    if (q === 'q1') {
                        const labels = expenseLabels[val] || expenseLabels['7'];
                        document.getElementById('label-exp1').textContent = labels[0];
                        document.getElementById('label-exp2').textContent = labels[1];
                        document.getElementById('label-exp3').textContent = labels[2];
                    }

                    if (state.q1 && state.q2 && state.q3 && step2.classList.contains('hidden')) {
                        step2.classList.remove('hidden');
                        setTimeout(() => {
                            step2.classList.replace('opacity-0', 'opacity-100');
                            step2.classList.replace('translate-y-6', 'translate-y-0');
                            setTimeout(() => { scrollToElement('section-sales'); document.getElementById('sales').focus(); }, 400);
                        }, 50);
                    }

                    if (q === 'q1' && !state.q2) scrollToElement('q2-group');
                    if (q === 'q2' && !state.q3) scrollToElement('q3-group');
                    updateProgress();
                });
            });

            rentToggle.addEventListener('change', (e) => {
                state.hasRent = e.target.checked;
                if (state.hasRent) {
                    rentWrapper.classList.add('open');
                    setTimeout(() => { scrollToElement('section-rent'); document.getElementById('rent').focus(); }, 300);
                } else {
                    rentWrapper.classList.remove('open');
                    state.rent = ''; document.getElementById('rent').value = '';
                }
                updateProgress();
            });

            moneyInputs.forEach(input => {
                input.addEventListener('input', (e) => {
                    let val = e.target.value.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)).replace(/[^0-9]/g, '');
                    e.target.value = val; state[e.target.id] = val;
                    updateProgress();
                });

                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        const nextId = input.dataset.next;
                        if (nextId === 'rent-focus-anchor') {
                            input.blur(); scrollToElement('section-rent');
                        } else if (nextId === 'delinquency-anchor') {
                            input.blur(); scrollToElement('section-delinquency');
                        } else {
                            const nextInput = document.getElementById(nextId);
                            if (nextInput) { scrollToElement(`section-${nextId}`); setTimeout(() => nextInput.focus(), 100); }
                        }
                    }
                });
            });

            // ==============================================
            // 診断実行 ＆ 絶望アニメーション ＆ 振り分けロジック
            // ==============================================
            btnSubmit.addEventListener('click', () => {
                if(audioCtx.state === 'suspended') audioCtx.resume(); // iOSオーディオ解除

                // 1. データの月額正規化
                const getMonthly = (valStr, period) => {
                    const num = parseInt(valStr, 10) || 0;
                    return period === 'year' ? Math.round(num / 12) : num;
                };

                const m_sales = getMonthly(state.sales, state.salesPeriod);
                const m_exp1 = getMonthly(state.exp1, state.exp1Period);
                const m_exp2 = getMonthly(state.exp2, state.exp2Period);
                const m_exp3 = getMonthly(state.exp3, state.exp3Period);
                const m_rent = state.hasRent ? getMonthly(state.rent, state.rentPeriod) : 0;
                
                const m_exp_total = m_exp1 + m_exp2 + m_exp3 + m_rent;
                const m_gross = m_sales - m_exp_total;
                
                const debt_tot = parseInt(state.debt_total, 10) || 0;
                const m_debt = parseInt(state.debt_monthly, 10) || 0;

                // ざっくり税金・社保計算 (売上の10% + 粗利の25%)
                let m_tax = Math.round((m_sales * 0.10) + (Math.max(0, m_gross) * 0.25));
                if(state.q3 === 'no') m_tax = Math.round(m_tax * 0.8); // 免税事業者は少し引く

                // 最終手残り
                const m_net = m_gross - m_debt - m_tax;

                // 2. アフィリエイト判定ロジック
                let resultType = '';
                let resultTitle = '';
                let resultText = '';
                let btnColor = '';
                let btnText = '';

                const isDebtAbnormal = m_debt > 0 && debt_tot > 0 && (debt_tot / m_debt) < 48; // 短期高金利フラグ
                const isBankrupt = m_net < 0 && (debt_tot > m_sales * 6 || state.delinquency === 'yes');

                if (isBankrupt) {
                    // パターンA: 弁護士(債務整理)
                    resultType = '弁護士';
                    resultTitle = '【危険】完全な資金ショート状態です';
                    resultText = '借金の返済と税金で会社のお金が完全に底を突いています（または滞納が発生）。このまま放置すると口座凍結・破産が確定します。今すぐ弁護士に無料相談し、返済をストップさせてください。';
                    btnColor = 'from-red-600 to-rose-700 shadow-red-500/30';
                    btnText = '🚨 今すぐ借金の減額診断をする(無料)';
                } else if (isDebtAbnormal || m_net <= 0) {
                    // パターンB: 資金調達・ファクタリング
                    resultType = '資金調達';
                    resultTitle = '【警告】異常な金利で首が締まっています';
                    resultText = '毎月の異常な返済額により、稼いでも手元にお金が残らない「黒字倒産」の危険水域です。高金利の借金を借り換えるか、売掛金を現金化（ファクタリング）して早急にキャッシュフローを回復させてください。';
                    btnColor = 'from-orange-500 to-red-600 shadow-orange-500/30';
                    btnText = '⚡ 資金調達・借り換えのプロに相談する';
                } else if (m_tax >= 10 || state.q2 === 'white') {
                    // パターンC: 税理士紹介
                    resultType = '税理士';
                    resultTitle = '【注意】税金・保険料を払いすぎています';
                    resultText = 'お金は回っていますが、申告方法（白色申告等）や節税対策が甘いため、国に無駄なお金を払いすぎています。プロの税理士に頼めば、月々の手残りはさらに数万円〜数十万円増える可能性があります。';
                    btnColor = 'from-blue-600 to-indigo-600 shadow-blue-500/30';
                    btnText = '👨‍💼 強い税理士を無料で探す';
                } else {
                    // パターンD: 会計ソフト
                    resultType = '会計ソフト';
                    resultTitle = '【順調】まずは日々の数字の見える化を！';
                    resultText = '現状、致命的な資金ショートの危険はありません。この健全な状態を維持するために、クラウド会計ソフトを導入して日々の数字をスマホで正確に把握できるようにしましょう。';
                    btnColor = 'from-emerald-500 to-teal-600 shadow-emerald-500/30';
                    btnText = '📱 おすすめのクラウド会計ソフトを見る';
                }

                // 3. UIの切り替え
                document.getElementById('view-form').classList.add('hidden');
                document.getElementById('body').classList.replace('bg-gray-100', 'bg-slate-900');
                const resultView = document.getElementById('view-result');
                resultView.classList.remove('hidden');

                // 4. ウォーターフォールアニメーション生成
                const waterfall = document.getElementById('result-waterfall');
                waterfall.innerHTML = ''; // クリア

                const createCard = (title, amount, isMinus, isHighlight) => {
                    const sign = isMinus ? '-' : '';
                    const color = isMinus ? 'text-rose-400' : 'text-blue-400';
                    const bg = isHighlight ? 'bg-slate-800 border-rose-500/50' : 'bg-slate-800/50 border-slate-700';
                    return `
                        <div class="waterfall-item w-full ${bg} border rounded-xl p-4 flex justify-between items-center shadow-lg">
                            <span class="text-slate-300 text-sm font-bold">${title}</span>
                            <span class="text-2xl font-black ${color}">${sign}${amount.toLocaleString()} <span class="text-xs font-normal">万円</span></span>
                        </div>
                    `;
                };

                // 要素を定義
                const items = [
                    { html: createCard('① 月間 売上高', m_sales, false, false), sound: 'chime', delay: 500 },
                    { html: createCard('② 経費・家賃合計', m_exp_total, true, false), sound: 'cash', delay: 1500 },
                    { html: createCard('③ 月々の借金返済', m_debt, true, false), sound: 'thud', delay: 2500 },
                    { html: createCard('④ 税金・保険料 (概算)', m_tax, true, true), sound: 'error', delay: 3500, flash: true },
                    { html: `
                        <div class="waterfall-item w-full mt-6 p-1 rounded-2xl bg-gradient-to-b ${m_net < 0 ? 'from-rose-500 to-red-700' : 'from-emerald-400 to-teal-600'}">
                            <div class="bg-slate-900 rounded-xl p-5 text-center">
                                <p class="text-slate-300 text-sm font-bold mb-2">あなたが自由に使える【手残り現金】</p>
                                <p class="text-5xl font-black ${m_net < 0 ? 'text-rose-500' : 'text-emerald-400'}">${m_net.toLocaleString()}<span class="text-lg ml-1">万円</span></p>
                            </div>
                        </div>
                    `, sound: 'doom', delay: 5000 }
                ];

                // 順番に表示
                items.forEach(item => {
                    setTimeout(() => {
                        // DOM追加
                        const div = document.createElement('div');
                        div.innerHTML = item.html;
                        const el = div.firstElementChild;
                        waterfall.appendChild(el);
                        
                        // アニメーション＆音
                        requestAnimationFrame(() => {
                            el.classList.add('show');
                            playSound(item.sound);
                            if (item.flash) {
                                document.getElementById('body').classList.add('flash-danger');
                            }
                        });
                    }, item.delay);
                });

                // 最後にアフィリエイト表示
                setTimeout(() => {
                    const affArea = document.getElementById('affiliate-area');
                    affArea.innerHTML = `
                        <div class="bg-slate-800 rounded-2xl p-5 border border-slate-700 shadow-2xl relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r ${btnColor.replace('shadow-', '')}"></div>
                            <h3 class="text-base font-bold text-white mb-3 flex items-center gap-2">
                                <svg class="w-5 h-5 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                                専門家からの緊急警告
                            </h3>
                            <p class="text-sm text-slate-300 leading-relaxed mb-5">${resultText}</p>
                            <a href="#" onclick="alert('${resultType}のアフィリエイトリンクへ遷移！'); return false;" class="block w-full py-4 rounded-xl bg-gradient-to-r ${btnColor} text-white text-center font-bold text-sm shadow-lg transform active:scale-95 transition-transform">
                                ${btnText}
                            </a>
                        </div>
                    `;
                    affArea.classList.remove('hidden');
                    requestAnimationFrame(() => affArea.classList.replace('opacity-0', 'opacity-100'));
                    
                    // スクロールを一番下へ
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                }, 6500);
            });
        });
    </script>
</body>
</html>
