<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>お金を残す！資金繰り改善シミュレーター</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }
        
        .expandable {
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease-in-out;
            max-height: 0; opacity: 0; overflow: hidden;
        }
        .expandable.open { max-height: 250px; opacity: 1; }

        .waterfall-item {
            opacity: 0; transform: translateY(-15px); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .waterfall-item.show { opacity: 1; transform: translateY(0); }
        
        @keyframes flash-red {
            0% { background-color: rgba(220, 38, 38, 0); }
            50% { background-color: rgba(220, 38, 38, 0.2); }
            100% { background-color: rgba(220, 38, 38, 0); }
        }
        .flash-danger { animation: flash-red 0.6s ease-out; }

        .input-group-focus:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            background-color: #ffffff;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans pb-32 transition-colors duration-700" id="body">

    <div id="view-form">
        <header class="fixed top-0 w-full z-50 bg-white shadow-sm border-b border-gray-200 left-0 right-0 mx-auto max-w-md">
            <div class="px-4 py-2.5 flex items-center justify-between">
                <div class="flex flex-col">
                    <p class="text-[10px] text-gray-500 font-bold mb-0.5">最短1分・個人情報不要</p>
                    <h1 class="text-[12px] font-bold text-gray-700 leading-tight">
                        お金を残す！<br>
                        <span class="text-blue-600 text-[15px] tracking-wide">資金繰り改善診断</span>
                    </h1>
                </div>
                <div id="remaining-box" class="bg-blue-50 text-blue-700 px-3 py-1.5 rounded-full text-xs font-bold border border-blue-200 shadow-sm flex items-center justify-center transition-colors duration-300">
                    <span id="remaining-text">あと<span id="remaining-count" class="text-lg leading-none mx-0.5">11</span>問</span>
                </div>
            </div>
        </header>

        <main class="max-w-md mx-auto pt-24 px-4">
            <div id="step1">
                <div class="bg-white rounded-2xl shadow-sm p-5 mb-5 border border-gray-100">
                    <h2 class="font-bold mb-4 flex items-center text-gray-800">
                        <span class="bg-blue-100 text-blue-700 text-xs py-1 px-2.5 rounded-md mr-2 font-black">Q1</span>あなたの業種は？
                    </h2>
                    <div class="grid grid-cols-2 gap-2" id="q1-group">
                        <button type="button" class="q-btn text-left px-3 py-3 rounded-xl border-2 border-gray-100 bg-gray-50 text-gray-600 text-sm font-medium hover:bg-gray-100 transition-colors active:scale-[0.98]" data-q="q1" data-val="1">👷 建設・一人親方</button>
                        <button type="button" class="q-btn text-left px-3 py-3 rounded-xl border-2 border-gray-100 bg-gray-50 text-gray-600 text-sm font-medium hover:bg-gray-100 transition-colors active:scale-[0.98]" data-q="q1" data-val="2">🍳 飲食店・カフェ</button>
                        <button type="button" class="q-btn text-left px-3 py-3 rounded-xl border-2 border-gray-100 bg-gray-50 text-gray-600 text-sm font-medium hover:bg-gray-100 transition-colors active:scale-[0.98]" data-q="q1" data-val="3">✂️ 美容・サロン</button>
                        <button type="button" class="q-btn text-left px-3 py-3 rounded-xl border-2 border-gray-100 bg-gray-50 text-gray-600 text-sm font-medium hover:bg-gray-100 transition-colors active:scale-[0.98]" data-q="q1" data-val="4">📦 小売・EC</button>
                        <button type="button" class="q-btn text-left px-3 py-3 rounded-xl border-2 border-gray-100 bg-gray-50 text-gray-600 text-sm font-medium hover:bg-gray-100 transition-colors active:scale-[0.98]" data-q="q1" data-val="5">🚚 軽貨物</button>
                        <button type="button" class="q-btn text-left px-3 py-3 rounded-xl border-2 border-gray-100 bg-gray-50 text-gray-600 text-sm font-medium hover:bg-gray-100 transition-colors active:scale-[0.98]" data-q="q1" data-val="6">💻 IT・フリー</button>
                        <button type="button" class="q-btn col-span-2 text-center px-4 py-3.5 rounded-xl border-2 border-gray-100 bg-gray-50 text-gray-600 font-medium hover:bg-gray-100 transition-colors active:scale-[0.98]" data-q="q1" data-val="7">📁 その他</button>
                    </div>
                </div>

                <div class="bg-white rounded-2xl shadow-sm p-5 mb-5 border border-gray-100" id="q2-anchor">
                    <h2 class="font-bold mb-4 flex items-center text-gray-800">
                        <span class="bg-blue-100 text-blue-700 text-xs py-1 px-2.5 rounded-md mr-2 font-black">Q2</span>申告スタイルは？
                    </h2>
                    <div class="grid grid-cols-3 gap-2" id="q2-group">
                        <button type="button" class="q-btn text-center px-1 py-3.5 rounded-xl border-2 border-gray-100 bg-gray-50 text-gray-600 text-xs font-bold transition-colors active:scale-[0.98]" data-q="q2" data-val="white">個人(白色)</button>
                        <button type="button" class="q-btn text-center px-1 py-3.5 rounded-xl border-2 border-gray-100 bg-gray-50 text-gray-600 text-xs font-bold transition-colors active:scale-[0.98]" data-q="q2" data-val="blue">個人(青色)</button>
                        <button type="button" class="q-btn text-center px-1 py-3.5 rounded-xl border-2 border-gray-100 bg-gray-50 text-gray-600 text-xs font-bold transition-colors active:scale-[0.98]" data-q="q2" data-val="corp">法人</button>
                    </div>
                </div>

                <div class="bg-white rounded-2xl shadow-sm p-5 mb-5 border border-gray-100" id="q3-anchor">
                    <h2 class="font-bold mb-4 flex items-center text-gray-800 leading-tight">
                        <span class="bg-blue-100 text-blue-700 text-xs py-1 px-2.5 rounded-md mr-2 font-black">Q3</span>インボイスに登録してる？
                    </h2>
                    <div class="grid grid-cols-2 gap-2" id="q3-group">
                        <button type="button" class="q-btn text-center px-2 py-4 rounded-xl border-2 border-gray-100 bg-gray-50 text-gray-600 text-sm font-bold transition-colors active:scale-[0.98]" data-q="q3" data-val="no">未登録(免税)</button>
                        <button type="button" class="q-btn text-center px-2 py-4 rounded-xl border-2 border-gray-100 bg-gray-50 text-gray-600 text-sm font-bold transition-colors active:scale-[0.98]" data-q="q3" data-val="yes">登録済(課税)</button>
                    </div>
                </div>
            </div>

            <form id="step2" class="hidden opacity-0 transform translate-y-6 transition-all duration-700 ease-out" onsubmit="return false;">
                <div class="flex items-center justify-center mb-6 mt-8">
                    <div class="h-px bg-gray-300 flex-1"></div>
                    <span class="px-4 text-gray-400 font-bold text-xs tracking-widest">ここから金額入力（小数可）</span>
                    <div class="h-px bg-gray-300 flex-1"></div>
                </div>

                <div class="bg-white rounded-2xl shadow-sm p-5 mb-4 border border-gray-100 scroll-anchor" id="section-sales">
                    <label class="block font-bold text-gray-800 text-lg mb-1">売上</label>
                    <p class="text-xs text-gray-400 mb-3">※ざっくりでOK！</p>
                    <div class="flex items-center gap-2">
                        <div class="relative flex-1 flex items-center bg-gray-50 border border-gray-200 rounded-xl transition-all shadow-inner input-group-focus overflow-hidden group">
                            <input type="text" inputmode="decimal" id="sales" class="money-input w-full bg-transparent px-3 py-3 text-lg font-bold text-right outline-none text-gray-800" placeholder="例: 150.5">
                            <span class="text-gray-500 font-bold pr-2">万</span>
                            <button type="button" tabindex="-1" class="next-inline-btn text-blue-600 font-bold text-sm whitespace-nowrap pr-3 active:opacity-40 transition-opacity" data-next="exp1">次へ</button>
                        </div>
                        <div class="bg-gray-100 p-1 rounded-xl flex w-[88px] border border-gray-200 items-stretch shrink-0">
                            <button type="button" class="period-btn flex-1 bg-white shadow-sm text-blue-600 rounded-lg text-xs font-bold" data-target="sales" data-val="month">月</button>
                            <button type="button" class="period-btn flex-1 text-gray-400 rounded-lg text-xs font-bold" data-target="sales" data-val="year">年</button>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-2xl shadow-sm p-5 mb-4 border border-gray-100">
                    <h3 class="font-bold mb-4 text-gray-800 text-lg flex items-center"><span class="mr-1">💸</span> 主な経費・支払い</h3>
                    
                    <div class="mb-5 scroll-anchor" id="section-exp1">
                        <label id="label-exp1" class="block font-bold mb-2 text-gray-600 text-sm">経費1</label>
                        <div class="flex items-center gap-2">
                            <div class="relative flex-1 flex items-center bg-gray-50 border border-gray-200 rounded-xl transition-all shadow-inner input-group-focus overflow-hidden">
                                <input type="text" inputmode="decimal" id="exp1" class="money-input w-full bg-transparent px-3 py-3 text-lg font-bold text-right outline-none text-gray-800" placeholder="例: 30">
                                <span class="text-gray-500 font-bold pr-2">万</span>
                                <button type="button" tabindex="-1" class="next-inline-btn text-blue-600 font-bold text-sm whitespace-nowrap pr-3 active:opacity-40 transition-opacity" data-next="exp2">次へ</button>
                            </div>
                            <div class="bg-gray-100 p-1 rounded-xl flex w-[88px] border border-gray-200 items-stretch shrink-0">
                                <button type="button" class="period-btn flex-1 bg-white shadow-sm text-blue-600 rounded-lg text-xs font-bold" data-target="exp1" data-val="month">月</button>
                                <button type="button" class="period-btn flex-1 text-gray-400 rounded-lg text-xs font-bold" data-target="exp1" data-val="year">年</button>
                            </div>
                        </div>
                    </div>

                    <div class="mb-5 scroll-anchor" id="section-exp2">
                        <label id="label-exp2" class="block font-bold mb-2 text-gray-600 text-sm">経費2</label>
                        <div class="flex items-center gap-2">
                            <div class="relative flex-1 flex items-center bg-gray-50 border border-gray-200 rounded-xl transition-all shadow-inner input-group-focus overflow-hidden">
                                <input type="text" inputmode="decimal" id="exp2" class="money-input w-full bg-transparent px-3 py-3 text-lg font-bold text-right outline-none text-gray-800" placeholder="例: 15">
                                <span class="text-gray-500 font-bold pr-2">万</span>
                                <button type="button" tabindex="-1" class="next-inline-btn text-blue-600 font-bold text-sm whitespace-nowrap pr-3 active:opacity-40 transition-opacity" data-next="exp3">次へ</button>
                            </div>
                            <div class="bg-gray-100 p-1 rounded-xl flex w-[88px] border border-gray-200 items-stretch shrink-0">
                                <button type="button" class="period-btn flex-1 bg-white shadow-sm text-blue-600 rounded-lg text-xs font-bold" data-target="exp2" data-val="month">月</button>
                                <button type="button" class="period-btn flex-1 text-gray-400 rounded-lg text-xs font-bold" data-target="exp2" data-val="year">年</button>
                            </div>
                        </div>
                    </div>

                    <div class="mb-5 scroll-anchor" id="section-exp3">
                        <label class="block font-bold mb-2 text-gray-600 text-sm">雑費・その他の経費</label>
                        <div class="flex items-center gap-2">
                            <div class="relative flex-1 flex items-center bg-gray-50 border border-gray-200 rounded-xl transition-all shadow-inner input-group-focus overflow-hidden">
                                <input type="text" inputmode="decimal" id="exp3" class="money-input w-full bg-transparent px-3 py-3 text-lg font-bold text-right outline-none text-gray-800" placeholder="例: 5">
                                <span class="text-gray-500 font-bold pr-2">万</span>
                                <button type="button" tabindex="-1" class="next-inline-btn text-blue-600 font-bold text-sm whitespace-nowrap pr-3 active:opacity-40 transition-opacity" data-next="labor">次へ</button>
                            </div>
                            <div class="bg-gray-100 p-1 rounded-xl flex w-[88px] border border-gray-200 items-stretch shrink-0">
                                <button type="button" class="period-btn flex-1 bg-white shadow-sm text-blue-600 rounded-lg text-xs font-bold" data-target="exp3" data-val="month">月</button>
                                <button type="button" class="period-btn flex-1 text-gray-400 rounded-lg text-xs font-bold" data-target="exp3" data-val="year">年</button>
                            </div>
                        </div>
                    </div>

                    <div class="scroll-anchor" id="section-labor">
                        <label class="block font-bold mb-2 text-gray-600 text-sm">人件費（従業員・バイト等）</label>
                        <div class="flex items-center gap-2">
                            <div class="relative flex-1 flex items-center bg-gray-50 border border-gray-200 rounded-xl transition-all shadow-inner input-group-focus overflow-hidden">
                                <input type="text" inputmode="decimal" id="labor" class="money-input w-full bg-transparent px-3 py-3 text-lg font-bold text-right outline-none text-gray-800" placeholder="※ない場合は0">
                                <span class="text-gray-500 font-bold pr-2">万</span>
                                <button type="button" tabindex="-1" class="next-inline-btn text-blue-600 font-bold text-sm whitespace-nowrap pr-3 active:opacity-40 transition-opacity" data-next="rent">次へ</button>
                            </div>
                            <div class="bg-gray-100 p-1 rounded-xl flex w-[88px] border border-gray-200 items-stretch shrink-0">
                                <button type="button" class="period-btn flex-1 bg-white shadow-sm text-blue-600 rounded-lg text-xs font-bold" data-target="labor" data-val="month">月</button>
                                <button type="button" class="period-btn flex-1 text-gray-400 rounded-lg text-xs font-bold" data-target="labor" data-val="year">年</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-2xl shadow-sm p-5 mb-4 border border-gray-100 scroll-anchor" id="section-rent">
                    <div class="flex items-center justify-between" id="rent-focus-anchor">
                        <div>
                            <h3 class="font-bold text-gray-800 text-sm mb-1">店舗・事務所など</h3>
                            <p class="text-base font-bold text-gray-800">「家賃」は払ってる？</p>
                        </div>
                        <label for="rent-toggle" class="flex items-center cursor-pointer ml-3">
                            <div class="relative">
                                <input type="checkbox" id="rent-toggle" class="sr-only peer">
                                <div class="block w-14 h-8 bg-gray-200 rounded-full peer-checked:bg-blue-600 transition-colors duration-300"></div>
                                <div class="dot absolute left-1 top-1 bg-white w-6 h-6 rounded-full transition-transform duration-300 peer-checked:translate-x-6 shadow-sm"></div>
                            </div>
                        </label>
                    </div>
                    
                    <div id="rent-wrapper" class="expandable">
                        <div class="pt-4 mt-2 border-t border-gray-100">
                            <div class="mb-4 scroll-anchor" id="sub-rent">
                                <label class="block font-bold mb-2 text-gray-600 text-sm">家賃・駐車場代</label>
                                <div class="flex items-center gap-2">
                                    <div class="relative flex-1 flex items-center bg-gray-50 border border-gray-200 rounded-xl transition-all shadow-inner input-group-focus overflow-hidden">
                                        <input type="text" inputmode="decimal" id="rent" class="money-input w-full bg-transparent px-3 py-3 text-lg font-bold text-right outline-none text-gray-800" placeholder="例: 8">
                                        <span class="text-gray-500 font-bold pr-2">万</span>
                                        <button type="button" tabindex="-1" class="next-inline-btn text-blue-600 font-bold text-sm whitespace-nowrap pr-3 active:opacity-40 transition-opacity" data-next="util">次へ</button>
                                    </div>
                                    <div class="bg-gray-100 p-1 rounded-xl flex w-[88px] border border-gray-200 items-stretch shrink-0">
                                        <button type="button" class="period-btn flex-1 bg-white shadow-sm text-blue-600 rounded-lg text-xs font-bold" data-target="rent" data-val="month">月</button>
                                        <button type="button" class="period-btn flex-1 text-gray-400 rounded-lg text-xs font-bold" data-target="rent" data-val="year">年</button>
                                    </div>
                                </div>
                            </div>
                            <div class="scroll-anchor" id="sub-util">
                                <label class="block font-bold mb-2 text-gray-600 text-sm">水道光熱費・通信費</label>
                                <div class="flex items-center gap-2">
                                    <div class="relative flex-1 flex items-center bg-gray-50 border border-gray-200 rounded-xl transition-all shadow-inner input-group-focus overflow-hidden">
                                        <input type="text" inputmode="decimal" id="util" class="money-input w-full bg-transparent px-3 py-3 text-lg font-bold text-right outline-none text-gray-800" placeholder="例: 3.5">
                                        <span class="text-gray-500 font-bold pr-2">万</span>
                                        <button type="button" tabindex="-1" class="next-inline-btn text-blue-600 font-bold text-sm whitespace-nowrap pr-3 active:opacity-40 transition-opacity" data-next="debt_total">次へ</button>
                                    </div>
                                    <div class="bg-gray-100 p-1 rounded-xl flex w-[88px] border border-gray-200 items-stretch shrink-0">
                                        <button type="button" class="period-btn flex-1 bg-white shadow-sm text-blue-600 rounded-lg text-xs font-bold" data-target="util" data-val="month">月</button>
                                        <button type="button" class="period-btn flex-1 text-gray-400 rounded-lg text-xs font-bold" data-target="util" data-val="year">年</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-2xl shadow-sm p-5 mb-4 border border-gray-100">
                    <h3 class="font-bold text-gray-800 text-lg mb-4 flex items-center">🏦 借金の状況</h3>
                    
                    <div class="mb-4 scroll-anchor" id="section-debt-total">
                        <label class="block font-bold text-gray-600 text-sm mb-1">現在の借入残高（総額）</label>
                        <p class="text-[10px] text-gray-400 mb-2">※事業用の借金すべて</p>
                        <div class="relative flex items-center bg-gray-50 border border-gray-200 rounded-xl transition-all shadow-inner input-group-focus overflow-hidden">
                            <input type="text" inputmode="decimal" id="debt_total" class="money-input w-full bg-transparent px-4 py-3 text-lg font-bold text-right outline-none text-gray-800" placeholder="例: 1000">
                            <span class="text-gray-500 font-bold pr-2">万</span>
                            <button type="button" tabindex="-1" class="next-inline-btn text-blue-600 font-bold text-sm whitespace-nowrap pr-3 active:opacity-40 transition-opacity" data-next="debt_monthly">次へ</button>
                        </div>
                    </div>

                    <div class="scroll-anchor" id="section-debt-monthly">
                        <label class="block font-bold text-gray-600 text-sm mb-1">毎月の返済額（元金）</label>
                        <p class="text-[10px] text-gray-400 mb-2">※ない場合は0</p>
                        <div class="flex items-center gap-2">
                            <div class="relative flex-1 flex items-center bg-gray-50 border border-gray-200 rounded-xl transition-all shadow-inner input-group-focus overflow-hidden">
                                <input type="text" inputmode="decimal" id="debt_monthly" class="money-input w-full bg-transparent px-3 py-3 text-lg font-bold text-right outline-none text-gray-800" placeholder="例: 11">
                                <span class="text-gray-500 font-bold pr-2">万</span>
                                <button type="button" tabindex="-1" class="next-inline-btn text-blue-600 font-bold text-sm whitespace-nowrap pr-3 active:opacity-40 transition-opacity" data-next="delinquency-anchor">完了</button>
                            </div>
                            <div class="bg-gray-100 border border-gray-200 rounded-xl px-3 py-3 text-xs font-bold text-gray-500 flex items-center justify-center shrink-0">
                                /月 固定
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-2xl shadow-sm p-5 mb-10 border border-gray-100 scroll-anchor" id="section-delinquency">
                    <h3 class="font-bold mb-4 text-gray-800 text-base text-center" id="delinquency-anchor">税金や借金の滞納はある？</h3>
                    <div class="flex gap-3">
                        <button type="button" class="q-btn flex-1 text-center py-4 rounded-xl border-2 border-gray-100 bg-gray-50 text-gray-600 font-bold transition-colors active:scale-[0.98]" data-q="delinquency" data-val="yes">はい</button>
                        <button type="button" class="q-btn flex-1 text-center py-4 rounded-xl border-2 border-gray-100 bg-gray-50 text-gray-600 font-bold transition-colors active:scale-[0.98]" data-q="delinquency" data-val="no">いいえ</button>
                    </div>
                </div>
            </form>
        </main>

        <footer id="footer-submit" class="fixed bottom-0 w-full z-40 left-0 right-0 mx-auto max-w-md pointer-events-none">
            <div class="px-4 py-4 relative">
                <div id="submit-btn-wrapper" class="transform translate-y-full opacity-0 transition-all duration-500 ease-out pointer-events-auto">
                    <button type="button" id="btn-submit" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold text-lg py-4 rounded-xl shadow-[0_10px_20px_-5px_rgba(59,130,246,0.4)] transform active:scale-95 transition-transform flex items-center justify-center">
                        <span class="mr-2 text-xl">✨</span> 診断する
                    </button>
                </div>
            </div>
        </footer>
    </div>

    <div id="view-result" class="hidden min-h-screen bg-slate-900 text-white pb-32">
        <header class="w-full bg-slate-950 shadow-md border-b border-slate-800 left-0 right-0 mx-auto max-w-md fixed top-0 z-50">
            <div class="px-4 py-3">
                <h1 class="text-center font-bold text-slate-300 text-sm tracking-widest">シミュレーション結果</h1>
            </div>
        </header>

        <main class="max-w-md mx-auto pt-[30vh] px-4 space-y-2.5 pb-10" id="result-waterfall">
            </main>

        <div id="affiliate-area" class="hidden max-w-md mx-auto mt-4 px-4 pb-10 opacity-0 transition-opacity duration-1000">
            </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const state = {
                q1: null, q2: null, q3: null, delinquency: null,
                sales: '', exp1: '', exp2: '', exp3: '', labor: '',
                hasRent: false, rent: '', util: '',
                debt_total: '', debt_monthly: '',
                salesPeriod: 'month', exp1Period: 'month', exp2Period: 'month', exp3Period: 'month', 
                laborPeriod: 'month', rentPeriod: 'month', utilPeriod: 'month'
            };

            const expenseLabels = {
                '1': ['材料費・仕入', '外注費'],
                '2': ['食材仕入', '広告費・その他'],
                '3': ['材料・商材費', '広告宣伝費'],
                '4': ['商品仕入', '梱包・配送費'],
                '5': ['車両・ガソリン代', '保険料・その他'],
                '6': ['外注費', '通信・サーバー代'],
                '7': ['仕入・材料費', '外注費・その他']
            };

            const step2 = document.getElementById('step2');
            const qBtns = document.querySelectorAll('.q-btn');
            const moneyInputs = document.querySelectorAll('.money-input');
            const rentToggle = document.getElementById('rent-toggle');
            const rentWrapper = document.getElementById('rent-wrapper');
            const submitBtnWrapper = document.getElementById('submit-btn-wrapper');
            const btnSubmit = document.getElementById('btn-submit');
            
            let audioCtx = null;
            const playSound = (type) => {
                try {
                    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    if (audioCtx.state === 'suspended') audioCtx.resume();
                    
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);

                    const now = audioCtx.currentTime;
                    if (type === 'chime') {
                        osc.type = 'sine'; osc.frequency.setValueAtTime(880, now); osc.frequency.exponentialRampToValueAtTime(1760, now + 0.1);
                        gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                        osc.start(now); osc.stop(now + 0.3);
                    } else if (type === 'cash') {
                        osc.type = 'square'; osc.frequency.setValueAtTime(100, now);
                        gain.gain.setValueAtTime(0.15, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                        osc.start(now); osc.stop(now + 0.15);
                    } else if (type === 'thud') {
                        osc.type = 'triangle'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(40, now + 0.3);
                        gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                        osc.start(now); osc.stop(now + 0.4);
                    } else if (type === 'error') {
                        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(120, now); osc.frequency.setValueAtTime(100, now + 0.1);
                        gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now + 0.4);
                        osc.start(now); osc.stop(now + 0.4);
                    } else if (type === 'doom') {
                        osc.type = 'sine'; osc.frequency.setValueAtTime(60, now); osc.frequency.exponentialRampToValueAtTime(20, now + 1.5);
                        gain.gain.setValueAtTime(0.5, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 1.5);
                        osc.start(now); osc.stop(now + 1.5);
                    }
                } catch(e) {
                    console.log("Audio API blocked");
                }
            };

            const scrollToElement = (elementId) => {
                const el = document.getElementById(elementId);
                if (el) {
                    const y = el.getBoundingClientRect().top + window.scrollY - (window.innerHeight / 3);
                    window.scrollTo({ top: y, behavior: 'smooth' });
                }
            };

            moneyInputs.forEach(input => {
                input.addEventListener('focus', (e) => {
                    const parentSection = e.target.closest('.scroll-anchor');
                    if (parentSection) {
                        setTimeout(() => scrollToElement(parentSection.id), 250);
                    }
                });
            });

            document.querySelectorAll('.next-inline-btn').forEach(btn => {
                // ★超重要：ボタンを押しても入力欄のフォーカス（キーボード）が消えないようにする魔法★
                btn.addEventListener('mousedown', (e) => e.preventDefault());
                btn.addEventListener('touchstart', (e) => e.preventDefault(), {passive: false});

                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const nextId = btn.dataset.next;
                    if (nextId === 'rent') {
                        if(state.hasRent) {
                            scrollToElement('sub-rent');
                            document.getElementById('rent').focus();
                        } else {
                            scrollToElement('section-debt-total');
                            document.getElementById('debt_total').focus();
                        }
                    } else if (nextId === 'delinquency-anchor') {
                        scrollToElement('section-delinquency');
                        document.activeElement.blur(); // 最後の「完了」の時だけキーボードを閉じる
                    } else {
                        const nextInput = document.getElementById(nextId);
                        if (nextInput) nextInput.focus();
                    }
                });
            });

            const updateProgress = () => {
                const required = ['q1', 'q2', 'q3', 'sales', 'exp1', 'exp2', 'exp3', 'labor', 'debt_total', 'debt_monthly', 'delinquency'];
                if (state.hasRent) { required.push('rent'); required.push('util'); }

                const filledCount = required.filter(key => {
                    if (['q1', 'q2', 'q3', 'delinquency'].includes(key)) return state[key] !== null;
                    return state[key] !== '';
                }).length;

                const remaining = required.length - filledCount;
                
                const remainingBox = document.getElementById('remaining-box');
                const remainingText = document.getElementById('remaining-text');

                if (remaining > 0) {
                    remainingText.innerHTML = `あと<span id="remaining-count" class="text-lg leading-none mx-0.5">${remaining}</span>問`;
                    remainingBox.classList.replace('bg-emerald-50', 'bg-blue-50');
                    remainingBox.classList.replace('text-emerald-700', 'text-blue-700');
                    remainingBox.classList.replace('border-emerald-200', 'border-blue-200');

                    submitBtnWrapper.classList.replace('translate-y-0', 'translate-y-full');
                    submitBtnWrapper.classList.replace('opacity-100', 'opacity-0');
                } else {
                    remainingText.innerHTML = `入力完了 ✨`;
                    remainingBox.classList.replace('bg-blue-50', 'bg-emerald-50');
                    remainingBox.classList.replace('text-blue-700', 'text-emerald-700');
                    remainingBox.classList.replace('border-blue-200', 'border-emerald-200');

                    submitBtnWrapper.classList.replace('translate-y-full', 'translate-y-0');
                    submitBtnWrapper.classList.replace('opacity-0', 'opacity-100');
                }
            };

            // --- UIイベント ---
            document.querySelectorAll('.period-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const target = btn.dataset.target;
                    const val = btn.dataset.val;
                    state[`${target}Period`] = val;
                    document.querySelectorAll(`.period-btn[data-target="${target}"]`).forEach(b => {
                        if (b.dataset.val === val) {
                            b.classList.add('bg-white', 'shadow-sm', 'text-blue-600');
                            b.classList.remove('text-gray-400');
                        } else {
                            b.classList.remove('bg-white', 'shadow-sm', 'text-blue-600');
                            b.classList.add('text-gray-400');
                        }
                    });
                });
            });

            qBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const q = btn.dataset.q;
                    const val = btn.dataset.val;
                    state[q] = val;
                    
                    document.querySelectorAll(`.q-btn[data-q="${q}"]`).forEach(b => {
                        if (b.dataset.val === val) {
                            b.classList.replace('bg-gray-50', 'bg-blue-50');
                            b.classList.replace('border-gray-100', 'border-blue-500');
                            b.classList.replace('text-gray-600', 'text-blue-700');
                        } else {
                            b.classList.replace('bg-blue-50', 'bg-gray-50');
                            b.classList.replace('border-blue-500', 'border-gray-100');
                            b.classList.replace('text-blue-700', 'text-gray-600');
                        }
                    });

                    if (q === 'q1') {
                        const labels = expenseLabels[val] || expenseLabels['7'];
                        document.getElementById('label-exp1').textContent = labels[0];
                        document.getElementById('label-exp2').textContent = labels[1];
                    }

                    if (state.q1 && state.q2 && state.q3 && step2.classList.contains('hidden')) {
                        step2.classList.remove('hidden');
                        setTimeout(() => {
                            step2.classList.replace('opacity-0', 'opacity-100');
                            step2.classList.replace('translate-y-6', 'translate-y-0');
                            setTimeout(() => { document.getElementById('sales').focus(); }, 400);
                        }, 50);
                    }

                    if (q === 'q1' && !state.q2) scrollToElement('q2-anchor');
                    if (q === 'q2' && !state.q3) scrollToElement('q3-anchor');
                    if (q === 'delinquency') scrollToElement('section-delinquency');
                    updateProgress();
                });
            });

            rentToggle.addEventListener('change', (e) => {
                state.hasRent = e.target.checked;
                if (state.hasRent) {
                    rentWrapper.classList.add('open');
                    setTimeout(() => { document.getElementById('rent').focus(); }, 300);
                } else {
                    rentWrapper.classList.remove('open');
                    state.rent = ''; document.getElementById('rent').value = '';
                    state.util = ''; document.getElementById('util').value = '';
                }
                updateProgress();
            });

            moneyInputs.forEach(input => {
                input.addEventListener('input', (e) => {
                    let val = e.target.value.replace(/[０-９．]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)).replace(/[^0-9.]/g, '');
                    const parts = val.split('.');
                    if (parts.length > 2) val = parts[0] + '.' + parts.slice(1).join('');
                    e.target.value = val; state[e.target.id] = val;
                    updateProgress();
                });
            });

            btnSubmit.addEventListener('click', () => {
                document.activeElement.blur(); 

                try {
                    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    if(audioCtx.state === 'suspended') audioCtx.resume();
                } catch(e){}

                const getMonthly = (valStr, period) => {
                    const num = parseFloat(valStr) || 0;
                    return period === 'year' ? (num / 12) : num;
                };

                const m_sales = getMonthly(state.sales, state.salesPeriod);
                const m_exp1 = getMonthly(state.exp1, state.exp1Period);
                const m_exp2 = getMonthly(state.exp2, state.exp2Period);
                const m_exp3 = getMonthly(state.exp3, state.exp3Period);
                const m_labor = getMonthly(state.labor, state.laborPeriod);
                const m_rent = state.hasRent ? getMonthly(state.rent, state.rentPeriod) : 0;
                const m_util = state.hasRent ? getMonthly(state.util, state.utilPeriod) : 0;
                
                const m_exp_total = m_exp1 + m_exp2 + m_exp3 + m_labor + m_rent + m_util;
                const m_gross = m_sales - m_exp_total;
                
                const debt_tot = parseFloat(state.debt_total) || 0;
                const m_debt = parseFloat(state.debt_monthly) || 0;

                let tax_cons = Math.max(0, (m_sales - m_exp1 - m_exp2 - m_exp3 - m_rent - m_util) * 0.10);
                if(state.q3 === 'no') tax_cons = tax_cons * 0.5;
                const tax_inc = Math.max(0, m_gross * 0.15);
                const tax_res = Math.max(0, m_gross * 0.10);
                const tax_soc = Math.max(0, m_gross * 0.12);
                const m_tax_total = tax_cons + tax_inc + tax_res + tax_soc;

                const m_net = m_gross - m_debt - m_tax_total;
                const round1 = (num) => Math.round(num * 10) / 10;

                let resultType, resultTitle, resultText, btnColor, btnText;
                const isDebtAbnormal = m_debt > 0 && debt_tot > 0 && (debt_tot / m_debt) < 48;
                const isBankrupt = m_net < 0 && (debt_tot > m_sales * 6 || state.delinquency === 'yes');

                if (isBankrupt) {
                    resultType = '弁護士'; resultTitle = '【危険】完全な資金ショート状態です';
                    resultText = '借金の返済と容赦ない税金で、会社のお金が完全に底を突いています。このまま放置すると口座凍結・破産が確定します。今すぐ弁護士に無料相談し、返済をストップさせてください。';
                    btnColor = 'from-red-600 to-rose-700 shadow-red-500/30'; btnText = '🚨 今すぐ借金の減額診断をする(無料)';
                } else if (isDebtAbnormal || m_net <= 0) {
                    resultType = '資金調達'; resultTitle = '【警告】異常な金利で首が締まっています';
                    resultText = '稼いでも稼いでも、異常な借金返済のせいで手元にお金が残らない「黒字倒産」の危険水域です。高金利の借金を借り換えるか、売掛金を現金化（ファクタリング）して早急に血止めの対策を。';
                    btnColor = 'from-orange-500 to-red-600 shadow-orange-500/30'; btnText = '⚡ 資金調達・借り換えのプロに相談する';
                } else if (m_tax_total >= 10 || state.q2 === 'white') {
                    resultType = '税理士'; resultTitle = '【注意】国に税金を払いすぎています';
                    resultText = 'お金は回っていますが、申告方法や節税対策が甘いため「見えない借金（税金）」で大損しています。プロの税理士に頼めば、月々の手残りはさらに数万〜数十万円増える可能性が高いです。';
                    btnColor = 'from-blue-600 to-indigo-600 shadow-blue-500/30'; btnText = '👨‍💼 強い税理士を無料で探す';
                } else {
                    resultType = '会計ソフト'; resultTitle = '【順調】まずは日々の数字の見える化を！';
                    resultText = '現状、致命的な資金ショートの危険はありません。この健全な状態を維持するために、クラウド会計ソフトを導入して日々の数字をスマホで正確に把握できるようにしましょう。';
                    btnColor = 'from-emerald-500 to-teal-600 shadow-emerald-500/30'; btnText = '📱 おすすめのクラウド会計ソフトを見る';
                }

                setTimeout(() => {
                    document.getElementById('view-form').classList.add('hidden');
                    document.getElementById('body').classList.replace('bg-gray-100', 'bg-slate-900');
                    const resultView = document.getElementById('view-result');
                    resultView.classList.remove('hidden');
                    
                    window.scrollTo(0, 0);

                    const waterfall = document.getElementById('result-waterfall');
                    waterfall.innerHTML = '';

                    const createCard = (title, amount, isMinus, isTax) => {
                        const sign = isMinus ? '-' : '';
                        const color = isMinus ? (isTax ? 'text-orange-400' : 'text-rose-400') : 'text-blue-400';
                        const bg = isTax ? 'bg-slate-800 border-orange-500/30' : 'bg-slate-800/50 border-slate-700';
                        return `
                            <div class="waterfall-item w-full ${bg} border rounded-xl p-3.5 flex justify-between items-center shadow-lg">
                                <span class="text-slate-300 text-sm font-bold">${title}</span>
                                <span class="text-xl font-black ${color}">${sign}${round1(amount).toLocaleString()} <span class="text-xs font-normal">万円</span></span>
                            </div>
                        `;
                    };

                    const items = [
                        { html: createCard('① 月間 売上高', m_sales, false, false), sound: 'chime', delay: 500 },
                        { html: createCard('② 経費・人件費・家賃等', m_exp_total, true, false), sound: 'cash', delay: 1500 },
                        { html: createCard('③ 月々の借金返済', m_debt, true, false), sound: 'thud', delay: 2500 },
                        { html: createCard('④ 消費税 (概算)', tax_cons, true, true), sound: 'thud', delay: 3500 },
                        { html: createCard('⑤ 所得・法人税 (概算)', tax_inc, true, true), sound: 'thud', delay: 4200 },
                        { html: createCard('⑥ 住民・事業税 (概算)', tax_res, true, true), sound: 'thud', delay: 4900 },
                        { html: createCard('⑦ 国保・社保料 (概算)', tax_soc, true, true), sound: 'error', delay: 5600, flash: true },
                        { html: `
                            <div class="waterfall-item w-full mt-6 p-1 rounded-2xl bg-gradient-to-b ${m_net < 0 ? 'from-rose-500 to-red-700' : 'from-emerald-400 to-teal-600'}">
                                <div class="bg-slate-900 rounded-xl p-5 text-center">
                                    <p class="text-slate-300 text-sm font-bold mb-2">あなたが自由に使える【月間の手残り現金】</p>
                                    <p class="text-5xl font-black ${m_net < 0 ? 'text-rose-500' : 'text-emerald-400'}">${round1(m_net).toLocaleString()}<span class="text-lg ml-1">万円</span></p>
                                </div>
                            </div>
                        `, sound: 'doom', delay: 7000 }
                    ];

                    items.forEach(item => {
                        setTimeout(() => {
                            const div = document.createElement('div');
                            div.innerHTML = item.html;
                            waterfall.appendChild(div.firstElementChild);
                            requestAnimationFrame(() => {
                                div.firstElementChild.classList.add('show');
                                playSound(item.sound);
                                if (item.flash) document.getElementById('body').classList.add('flash-danger');
                            });
                            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                        }, item.delay);
                    });

                    setTimeout(() => {
                        const affArea = document.getElementById('affiliate-area');
                        affArea.innerHTML = `
                            <div class="bg-slate-800 rounded-2xl p-5 border border-slate-700 shadow-2xl relative overflow-hidden">
                                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r ${btnColor.replace('shadow-', '')}"></div>
                                <h3 class="text-base font-bold text-white mb-3 flex items-center gap-2">
                                    <svg class="w-5 h-5 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                                    専門家からの緊急警告
                                </h3>
                                <p class="text-sm text-slate-300 leading-relaxed mb-5">${resultText}</p>
                                <a href="#" onclick="alert('${resultType}のアフィリエイトリンクへ遷移！'); return false;" class="block w-full py-4 rounded-xl bg-gradient-to-r ${btnColor} text-white text-center font-bold text-sm shadow-lg transform active:scale-95 transition-transform">
                                    ${btnText}
                                </a>
                            </div>
                        `;
                        affArea.classList.remove('hidden');
                        requestAnimationFrame(() => affArea.classList.replace('opacity-0', 'opacity-100'));
                        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                    }, 8500);

                }, 300);
            });
        });
    </script>
</body>
</html>
